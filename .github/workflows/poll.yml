name: Live Price Poll
on:
  schedule:
    - cron: '*/15 9-21 * * 1-5'   # Every 15 min, 9am-9pm ET weekdays
  workflow_dispatch:

concurrency:
  group: repo-write-poll
  cancel-in-progress: true   # Drop stale price polls; separate group from morning/evening

jobs:
  poll:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: pip
      - run: pip install -r requirements.txt
      - name: Poll prices + news
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          ASSET_TICKERS: ${{ vars.ASSET_TICKERS || 'SPY,QQQ,IWM,XLE,XLF,XLK,GLD,SLV,TLT,IEF,HYG,LQD,BIL,^TNX,GC=F,SI=F,CL=F,NG=F,HG=F,ZW=F,ZC=F,^VIX,UVXY,DX-Y.NYB,^IRX,BTC-USD,ETH-USD,SOL-USD,EEM,EFA,FXI' }}
        run: python main.py --poll
      - name: Commit live prices
        run: |
          git config user.name  "Trading Co-Pilot Bot"
          git config user.email "bot@trading-copilot.com"
          git add data/prices_live.json data/intelligence_feed.json || true
          if ! git diff --cached --quiet; then
            git commit -m "poll: prices $(date -u +'%H:%M UTC')"
            git pull --rebase -X ours origin main
            git push
          fi
