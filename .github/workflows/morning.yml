name: Morning Update — Grade + Signals
on:
  schedule:
    - cron: '0 14 * * 1-5'   # 10:00 AM ET
  workflow_dispatch:

concurrency:
  group: repo-write
  cancel-in-progress: false

jobs:
  morning:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    env:
      ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
      FRED_API_KEY:      ${{ secrets.FRED_API_KEY }}
      ALERT_WEBHOOK_URL: ${{ secrets.ALERT_WEBHOOK_URL }}
      ALERT_EMAIL:       ${{ secrets.ALERT_EMAIL }}
      ASSET_TICKERS:     ${{ vars.ASSET_TICKERS || 'SPY,QQQ,IWM,XLE,XLF,XLK,GLD,SLV,TLT,IEF,HYG,LQD,BIL,^TNX,GC=F,SI=F,CL=F,NG=F,HG=F,ZW=F,ZC=F,^VIX,UVXY,DX-Y.NYB,^IRX,BTC-USD,ETH-USD,SOL-USD,EEM,EFA,FXI' }}
      FORECAST_HORIZONS: '5,30,90'
      POLYMARKET_MIN_VOLUME: '25000'
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-python@v6
        with:
          python-version: '3.11'
          cache: pip
          cache-dependency-path: requirements.txt
      - name: Install deps
        run: pip install -r requirements.txt

      - name: Generate auth config
        env:
          DASHBOARD_PASSWORD: ${{ secrets.DASHBOARD_PASSWORD }}
        run: |
          python -c "
          import os, hashlib, json, pathlib
          pw = os.environ.get('DASHBOARD_PASSWORD', '')
          h = hashlib.sha256(pw.encode()).hexdigest()
          pathlib.Path('data').mkdir(exist_ok=True)
          with open('data/auth_config.json', 'w') as f:
              json.dump({'password_hash': h}, f)
          print('auth_config.json written')
          "

      - name: Grade actuals
        run: python main.py --update
        continue-on-error: true

      - name: Fetch macro context
        run: python main.py --macro
        continue-on-error: true

      - name: Fetch COT positioning (CFTC)
        run: python main.py --cot
        continue-on-error: true

      - name: Poll news + NLP
        run: python main.py --news
        continue-on-error: true

      - name: Polymarket signals
        run: python main.py --polymarket
        continue-on-error: true

      - name: Economic calendar
        run: python main.py --calendar
        continue-on-error: true

      - name: Dispatch alerts
        run: python main.py --alerts
        continue-on-error: true

      - name: Commit updated data
        run: |
          git config user.name  "Trading Co-Pilot Bot"
          git config user.email "bot@trading-copilot.com"
          git add data/ || true
          if ! git diff --cached --quiet; then
            git commit -m "data: morning update $(date -u +'%Y-%m-%d %H:%M UTC')"
            git pull --rebase -X ours origin main
            git push
          fi

      - name: Notify Discord — morning complete
        if: always()
        run: python scripts/notify_discord.py --event morning
