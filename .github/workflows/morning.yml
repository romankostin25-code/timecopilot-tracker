name: Morning Update — Grade + Signals
on:
  schedule:
    - cron: '0 14 * * 1-5'   # 10:00 AM ET
  workflow_dispatch:
jobs:
  morning:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: pip
      - run: pip install -r requirements.txt
      - name: Grade actuals + macro + news + polymarket
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          FRED_API_KEY:      ${{ secrets.FRED_API_KEY }}
          ALERT_WEBHOOK_URL: ${{ secrets.ALERT_WEBHOOK_URL }}
          ALERT_EMAIL:       ${{ secrets.ALERT_EMAIL }}
          ASSET_TICKERS:     ${{ vars.ASSET_TICKERS || 'SPY,QQQ,IWM,XLE,XLF,XLK,GLD,SLV,TLT,IEF,HYG,LQD,BIL,^TNX,GC=F,SI=F,CL=F,NG=F,HG=F,ZW=F,ZC=F,^VIX,UVXY,DX-Y.NYB,^IRX,BTC-USD,ETH-USD,SOL-USD,EEM,EFA,FXI' }}
          FORECAST_HORIZONS: '5,30,90'
          POLYMARKET_MIN_VOLUME: '25000'
        run: |
          python main.py --update
          python main.py --macro
          python main.py --news
          python main.py --polymarket
          python main.py --calendar
          python main.py --alerts
      - name: Commit updated data
        run: |
          git config user.name  "Trading Co-Pilot Bot"
          git config user.email "bot@trading-copilot.com"
          git add data/ || true
          git diff --cached --quiet || \
            git commit -m "data: morning update $(date -u +'%Y-%m-%d %H:%M UTC')" && \
            git push
