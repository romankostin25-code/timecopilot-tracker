name: Weekly ML Retrain

on:
  schedule:
    - cron: '0 4 * * 0'   # Sunday 04:00 UTC (midnight ET) — always uses 1095 days
  workflow_dispatch:
    inputs:
      days_back:
        description: 'Days of history to pull (default 1095 = 3yr; use 1095+ for full retrain)'
        required: false
        default: '1095'
      finetune_only:
        description: 'Skip Phase 1 training — only fine-tune existing checkpoints on last 90d'
        required: false
        default: 'false'

concurrency:
  group: ml-retrain
  cancel-in-progress: false

jobs:
  retrain:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    timeout-minutes: 420

    env:
      PYTHONPATH:       '.'
      POLYGON_API_KEY:  ${{ secrets.POLYGON_API_KEY }}
      FRED_API_KEY:     ${{ secrets.FRED_API_KEY }}
      ASSET_TICKERS:    ${{ vars.ASSET_TICKERS || 'SPY,QQQ,IWM,XLE,XLF,XLK,GLD,SLV,TLT,IEF,HYG,LQD,BIL,^TNX,GC=F,SI=F,CL=F,NG=F,HG=F,ZW=F,ZC=F,^VIX,UVXY,DX-Y.NYB,^IRX,BTC-USD,ETH-USD,SOL-USD,EEM,EFA,FXI' }}
      FORECAST_HORIZONS: '5,30,90'

    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-python@v6
        with:
          python-version: '3.11'
          cache: pip
          cache-dependency-path: requirements-ml.txt

      - name: Install ML dependencies (CPU-only torch to fit runner disk)
        run: |
          pip install "torch>=2.1.0,<2.5.0" torchvision --index-url https://download.pytorch.org/whl/cpu
          pip install -r requirements-ml.txt
        timeout-minutes: 20

      - name: Pull historical news (Polygon, 3yr)
        run: |
          python scripts/pull_historical_news.py \
            --days ${{ github.event.inputs.days_back || '1095' }}
        timeout-minutes: 60

      - name: Compute price + macro features (3yr + Fama-French + credit spreads + PCR)
        run: |
          python scripts/compute_features.py \
            --days ${{ github.event.inputs.days_back || '1095' }}
        timeout-minutes: 30

      - name: Assemble training dataset
        run: python scripts/assemble_training_data.py
        timeout-minutes: 10

      - name: Phase 1 — Train TFT models on full 3yr dataset (with early stopping)
        if: ${{ github.event.inputs.finetune_only != 'true' }}
        run: python engine/train_tft.py --epochs 30
        timeout-minutes: 200

      - name: Phase 2 — Fine-tune TFT on most recent 90 days
        run: python engine/train_tft.py --finetune --finetune-days 90
        timeout-minutes: 60
        continue-on-error: true

      - name: Retrain logistic meta-learner
        run: python main.py --train

      - name: Run TFT inference and save scores cache
        run: python main.py --tft-scores
        continue-on-error: true

      - name: Commit models and datasets
        run: |
          git config user.name  "Trading Co-Pilot Bot"
          git config user.email "bot@trading-copilot.com"
          git add data/features.parquet data/news_sentiment.parquet \
                  data/training_dataset.parquet data/tft_checkpoint/ \
                  data/direction_model.pkl data/tft_training_log.json \
                  data/tft_scores_cache.json || true
          if ! git diff --cached --quiet; then
            git commit -m "retrain: weekly ML update $(date -u +'%Y-%m-%d')"
            git pull --rebase -X ours origin main
            git push
          fi

      - name: Notify Discord — retrain complete
        if: always()
        env:
          ALERT_WEBHOOK_URL: ${{ secrets.ALERT_WEBHOOK_URL }}
        run: pip install requests --quiet && python scripts/notify_discord.py --event retrain
