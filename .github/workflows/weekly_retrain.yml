name: Weekly Classifier Retrain

on:
  schedule:
    - cron: '0 4 * * 0'   # Sunday 04:00 UTC (midnight ET)
  workflow_dispatch:

jobs:
  retrain:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    timeout-minutes: 60

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install uv
        run: pip install uv

      - name: Install dependencies
        run: uv pip install --system -r requirements.txt

      - name: Retrain direction meta-learner
        run: python main.py --train

      - name: Commit trained model
        run: |
          git config user.name  "Trading Co-Pilot Bot"
          git config user.email "bot@trading-copilot.com"
          git add data/direction_model.pkl || true
          if ! git diff --cached --quiet; then
            git commit -m "retrain: direction meta-learner $(date -u +'%Y-%m-%d')"
            git pull --rebase -X ours origin main
            git push
          fi
