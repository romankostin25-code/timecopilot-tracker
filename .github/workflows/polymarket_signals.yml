name: Polymarket Signal Detection

on:
  schedule:
    - cron: '0 * * * 1-5'   # every hour on weekdays UTC
  workflow_dispatch:

jobs:
  polymarket:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install uv
        run: pip install uv

      - name: Install dependencies
        run: uv pip install --system requests pandas numpy scipy yfinance python-dotenv

      - name: Run poly-signals pipeline
        run: python main.py --poly-signals

      - name: Commit updated signal files
        run: |
          git config user.name  "Trading Co-Pilot Bot"
          git config user.email "bot@trading-copilot.internal"
          git add data/ forecasts.csv || true
          if ! git diff --cached --quiet; then
            git commit -m "poly-signals: $(date -u +'%Y-%m-%d %H:%M UTC')"
            git push || (git stash --include-untracked && git pull --rebase origin main && git stash pop && git push)
          fi
