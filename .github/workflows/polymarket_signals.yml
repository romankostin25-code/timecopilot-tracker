name: Polymarket Signal Detection

on:
  schedule:
    - cron: '0 * * * 1-5'   # every hour on weekdays UTC
  workflow_dispatch:

concurrency:
  group: repo-write-poly
  cancel-in-progress: true   # Drop stale polymarket polls; separate group from morning/evening

jobs:
  polymarket:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install deps
        run: pip install uv && uv pip install --system requests pandas numpy scipy yfinance python-dotenv

      - name: Run polymarket signals
        run: python main.py --polymarket

      - name: Commit updated signal files
        run: |
          git config user.name  "Trading Co-Pilot Bot"
          git config user.email "bot@trading-copilot.com"
          git add data/ || true
          if ! git diff --cached --quiet; then
            git commit -m "poly-signals: $(date -u +'%Y-%m-%d %H:%M UTC')"
            git pull --rebase -X ours origin main
            git push
          fi
