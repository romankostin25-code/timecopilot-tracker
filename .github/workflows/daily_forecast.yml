name: Daily Forecast Update

on:
  schedule:
    # Morning run (14:00 UTC = 10:00 ET): fill in actuals from previous close
    - cron: '0 14 * * 1-5'
    # Evening run (22:00 UTC = 18:00 ET): new forecasts + actuals
    - cron: '0 22 * * 1-5'
  workflow_dispatch:

jobs:
  forecast:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: pip

      - name: Install dependencies
        run: |
          pip install --quiet \
            yfinance pandas numpy python-dotenv \
            statsforecast lightgbm

      - name: Run forecast + update actuals
        env:
          ASSET_TICKERS: ${{ vars.ASSET_TICKERS || 'NG=F,GC=F,SI=F,CL=F,EURUSD=X,GBPUSD=X,USDJPY=X,AUDUSD=X,USDCHF=X' }}
          FORECAST_HORIZON: '10'
          FORECAST_FREQUENCY: 'B'
          LLM_API_KEY: ${{ secrets.LLM_API_KEY }}
        run: python main.py --auto

      - name: Commit updated forecasts.csv
        run: |
          git config user.name  "Roman Kostin"
          git config user.email "Roman@hirz.ai"
          git add forecasts.csv
          git diff --cached --quiet || \
            git commit -m "data: update forecasts $(date -u +%Y-%m-%d\ %H:%M\ UTC)" && \
            git push
