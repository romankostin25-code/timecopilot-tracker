name: Run Forecasts
on:
  workflow_dispatch:

concurrency:
  group: repo-write
  cancel-in-progress: false

jobs:
  forecast:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    env:
      ASSET_TICKERS: ${{ vars.ASSET_TICKERS || 'SPY,QQQ,IWM,XLE,XLF,XLK,GLD,SLV,TLT,IEF,HYG,LQD,BIL,^TNX,GC=F,SI=F,CL=F,NG=F,HG=F,ZW=F,ZC=F,^VIX,UVXY,DX-Y.NYB,^IRX,BTC-USD,ETH-USD,SOL-USD,EEM,EFA,FXI' }}
      FORECAST_HORIZONS: '5,30,90'
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-python@v6
        with:
          python-version: '3.11'
          cache: pip
      - name: Install deps
        run: pip install -r requirements.txt

      - name: Run forecasts
        run: python main.py --forecast
        timeout-minutes: 90

      - name: Commit forecast data
        run: |
          git config user.name  "Trading Co-Pilot Bot"
          git config user.email "bot@trading-copilot.com"
          git add data/forecasts.csv data/futures_curve.csv || true
          if ! git diff --cached --quiet; then
            git commit -m "data: forecast run $(date -u +'%Y-%m-%d %H:%M UTC')"
            git pull --rebase -X ours origin main
            git push
          fi
