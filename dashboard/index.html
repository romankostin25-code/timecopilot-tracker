<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Trading Co-Pilot — Login</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;600&family=IBM+Plex+Sans:wght@300;400;600&display=swap" rel="stylesheet">
  <style>
    *{margin:0;padding:0;box-sizing:border-box}
    body{background:#080c10;color:#c8d6e5;font-family:'IBM Plex Sans',sans-serif;
         display:flex;align-items:center;justify-content:center;height:100vh;overflow:hidden}
    .box{background:#0d1420;border:1px solid #1a2840;border-radius:8px;padding:48px;width:400px}
    h1{color:#00d4ff;font-size:22px;font-family:'IBM Plex Mono',monospace;margin-bottom:6px}
    .sub{color:#6b8ab0;font-size:12px;margin-bottom:32px;font-family:'IBM Plex Mono',monospace}
    label{display:block;font-size:11px;color:#6b8ab0;text-transform:uppercase;letter-spacing:.08em;margin-bottom:6px}
    input{width:100%;background:#080c10;border:1px solid #1a2840;border-radius:4px;
          padding:12px 16px;color:#c8d6e5;font-size:14px;font-family:'IBM Plex Mono',monospace;
          outline:none;margin-bottom:16px;transition:border .15s}
    input:focus{border-color:#00d4ff}
    button{width:100%;background:#00d4ff;color:#080c10;border:none;border-radius:4px;
           padding:12px;font-size:13px;font-weight:700;cursor:pointer;
           font-family:'IBM Plex Mono',monospace;letter-spacing:.05em;transition:background .15s}
    button:hover{background:#00b8d9}
    .err{color:#ff3355;font-size:12px;margin-top:10px;display:none;font-family:'IBM Plex Mono',monospace}
    .pulse{display:inline-block;width:6px;height:6px;border-radius:50%;background:#00d4ff;
           margin-right:6px;animation:blink 1.2s infinite}
    @keyframes blink{0%,100%{opacity:1}50%{opacity:.3}}
  </style>
</head>
<body>
  <div class="box">
    <h1><span class="pulse"></span>Trading Co-Pilot</h1>
    <div class="sub">v3.0 · Professional Macro Intelligence</div>
    <label for="pw">Access Password</label>
    <input type="password" id="pw" placeholder="••••••••••••" autocomplete="current-password">
    <button onclick="login()">Enter Terminal</button>
    <div class="err" id="err">Invalid password. Contact your administrator.</div>
  </div>

  <script>
    async function login() {
      const pw  = document.getElementById('pw').value;
      const btn = document.querySelector('button');
      btn.textContent = 'Authenticating…';
      btn.disabled = true;

      try {
        const res = await fetch('/api/auth', {
          method: 'POST',
          headers: {'Content-Type': 'application/json'},
          body: JSON.stringify({password: pw}),
        });
        if (res.ok) {
          const data = await res.json();
          sessionStorage.setItem('tcp_token', data.token);
          window.location.href = '/terminal.html';
        } else {
          document.getElementById('err').style.display = 'block';
          btn.textContent = 'Enter Terminal';
          btn.disabled = false;
        }
      } catch {
        // Fallback: skip auth if API not available (static deployment)
        sessionStorage.setItem('tcp_token', 'static');
        window.location.href = 'terminal.html';
      }
    }

    document.getElementById('pw').addEventListener('keydown', e => {
      if (e.key === 'Enter') login();
    });
    document.getElementById('pw').focus();
  </script>
</body>
</html>
